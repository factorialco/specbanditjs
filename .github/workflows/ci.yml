name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run unit tests
        run: |
          GITHUB_STEP_SUMMARY=/dev/null npm run test

  typecheck:
    name: "Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  e2e:
    name: "E2E"
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build

      # ── Scenario 1: CLI adapter — all pass (echo) ──

      - name: "Scenario 1: CLI adapter — all pass"
        id: scenario1
        run: |
          KEY="e2e-pass-${{ github.run_id }}"
          node dist/bin.js push --key "$KEY" \
            apple banana cherry date elderberry fig grape \
            honeydew kiwi lemon mango nectarine

          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w1" --command echo --batch-size 2 --verbose > pass-worker-1.log 2>&1 &
          PID1=$!
          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w2" --command echo --batch-size 2 --verbose > pass-worker-2.log 2>&1 &
          PID2=$!
          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w3" --command echo --batch-size 2 --verbose > pass-worker-3.log 2>&1 &
          PID3=$!

          FAIL=0
          wait $PID1 || FAIL=1
          wait $PID2 || FAIL=1
          wait $PID3 || FAIL=1

          for i in 1 2 3; do
            echo "========== Worker ${i} =========="
            cat "pass-worker-${i}.log"
            echo ""
          done

          # All workers should succeed
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Expected all workers to pass"
            exit 1
          fi

          # Every worker must have exhausted the queue or had nothing to do
          for i in 1 2 3; do
            if ! grep -q "Queue exhausted\|Nothing to do" "pass-worker-${i}.log"; then
              echo "::error::Worker ${i} did not exhaust the queue or report nothing to do"
              FAIL=1
            fi
          done

          echo "## Scenario 1: CLI adapter — all pass" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "3 workers competed for 12 words via \`echo\` command." >> "$GITHUB_STEP_SUMMARY"

          exit $FAIL

      # ── Scenario 2: CLI adapter — some fail ──

      - name: "Scenario 2: CLI adapter — some fail"
        id: scenario2
        if: always()
        run: |
          # Create a tiny script that exits 1 if any argument contains "FAIL"
          cat > /tmp/check.sh << 'SCRIPT'
          #!/bin/bash
          for arg in "$@"; do
            case "$arg" in *FAIL*) exit 1;; esac
          done
          SCRIPT
          chmod +x /tmp/check.sh

          KEY="e2e-fail-${{ github.run_id }}"
          node dist/bin.js push --key "$KEY" \
            apple banana FAIL_cherry date FAIL_elderberry fig \
            grape honeydew FAIL_kiwi lemon FAIL_mango nectarine

          mkdir -p tmp/e2e_fail_results

          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w1" --command /tmp/check.sh --batch-size 1 --verbose --json-out tmp/e2e_fail_results/w1.json > fail-worker-1.log 2>&1 &
          PID1=$!
          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w2" --command /tmp/check.sh --batch-size 1 --verbose --json-out tmp/e2e_fail_results/w2.json > fail-worker-2.log 2>&1 &
          PID2=$!
          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w3" --command /tmp/check.sh --batch-size 1 --verbose --json-out tmp/e2e_fail_results/w3.json > fail-worker-3.log 2>&1 &
          PID3=$!

          W1_EXIT=0; wait $PID1 || W1_EXIT=$?
          W2_EXIT=0; wait $PID2 || W2_EXIT=$?
          W3_EXIT=0; wait $PID3 || W3_EXIT=$?

          for i in 1 2 3; do
            EXIT_VAR="W${i}_EXIT"
            echo "========== Worker ${i} (exit: $(eval echo "\$$EXIT_VAR")) =========="
            cat "fail-worker-${i}.log"
            echo ""
          done

          ERRORS=0

          # At least one worker must have failed
          if [ "$W1_EXIT" -eq 0 ] && [ "$W2_EXIT" -eq 0 ] && [ "$W3_EXIT" -eq 0 ]; then
            echo "::error::Expected at least one worker to fail"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one worker log must contain "SOME FAILED"
          if ! grep -q "SOME FAILED" fail-worker-*.log; then
            echo "::error::No worker reported 'SOME FAILED'"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one batch passed somewhere
          if ! grep -q "passed\." fail-worker-*.log; then
            echo "::error::No worker reported any passing batch"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one batch failed somewhere
          if ! grep -q "FAILED (exit code:" fail-worker-*.log; then
            echo "::error::No worker reported any failing batch"
            ERRORS=$((ERRORS + 1))
          fi

          # Every worker must have exhausted the queue or had nothing to do
          for i in 1 2 3; do
            if ! grep -q "Queue exhausted\|Nothing to do" "fail-worker-${i}.log"; then
              echo "::error::Worker ${i} did not exhaust the queue or report nothing to do"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # JSON output validation
          TOTAL_JSON_FILES=0
          TOTAL_JSON_FAILED=0
          for i in 1 2 3; do
            JSON_FILE="tmp/e2e_fail_results/w${i}.json"
            if [ -f "$JSON_FILE" ]; then
              W_FILES=$(node -e "const j=JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8')); console.log(j.summary.total_files)")
              W_FAILED=$(node -e "const j=JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8')); console.log(j.summary.failed_batches)")
              echo "Worker ${i} JSON: ${W_FILES} files, ${W_FAILED} failed batches"
              TOTAL_JSON_FILES=$((TOTAL_JSON_FILES + W_FILES))
              TOTAL_JSON_FAILED=$((TOTAL_JSON_FAILED + W_FAILED))
            fi
          done

          if [ "$TOTAL_JSON_FILES" -ne 12 ]; then
            echo "::error::Expected 12 total files in merged JSONs, found $TOTAL_JSON_FILES"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$TOTAL_JSON_FAILED" -ne 4 ]; then
            echo "::error::Expected 4 total failed batches in merged JSONs, found $TOTAL_JSON_FAILED"
            ERRORS=$((ERRORS + 1))
          fi

          echo "## Scenario 2: CLI adapter — some fail" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "3 workers competed for 12 words (4 with FAIL prefix) via \`/tmp/check.sh\`." >> "$GITHUB_STEP_SUMMARY"

          exit $ERRORS

      # ── Scenario 3: Jest adapter — all specs pass ──

      - name: "Scenario 3: Jest adapter — all specs pass"
        id: scenario3
        if: always()
        run: |
          cd test/fixtures/jest-project
          npm install --ignore-scripts

          # Push only the passing specs (6 files)
          SPECBANDIT="../../../dist/bin.js"
          KEY="e2e-jest-pass-${{ github.run_id }}"
          node "$SPECBANDIT" push --key "$KEY" \
            specs/math.test.js specs/strings.test.js specs/arrays.test.js \
            specs/objects.test.js specs/async.test.js specs/regex.test.js

          GITHUB_STEP_SUMMARY= node "$SPECBANDIT" work --key "$KEY" --key-rerun "${KEY}-w1" \
            --adapter jest --jest-config ./jest.config.js --project-root . \
            --command-opts "--cacheDirectory .jest-cache-w1" \
            --batch-size 2 --verbose > jest-pass-w1.log 2>&1 &
          PID1=$!
          GITHUB_STEP_SUMMARY= node "$SPECBANDIT" work --key "$KEY" --key-rerun "${KEY}-w2" \
            --adapter jest --jest-config ./jest.config.js --project-root . \
            --command-opts "--cacheDirectory .jest-cache-w2" \
            --batch-size 2 --verbose > jest-pass-w2.log 2>&1 &
          PID2=$!

          FAIL=0
          wait $PID1 || FAIL=1
          wait $PID2 || FAIL=1

          for i in 1 2; do
            echo "========== Jest Worker ${i} =========="
            cat "jest-pass-w${i}.log"
            echo ""
          done

          # All workers should succeed
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Expected all Jest workers to pass, but at least one failed"
          fi

          # Verify haste map setup message appeared (proves Jest adapter was used)
          ADAPTER_USED=0
          for i in 1 2; do
            if grep -q "\[specbandit:jest\] Setup complete" "jest-pass-w${i}.log"; then
              ADAPTER_USED=1
            fi
          done
          if [ "$ADAPTER_USED" -eq 0 ]; then
            echo "::error::No worker log contains Jest adapter setup message"
            FAIL=1
          fi

          # Every worker must have exhausted the queue or had nothing to do
          for i in 1 2; do
            if ! grep -q "Queue exhausted\|Nothing to do" "jest-pass-w${i}.log"; then
              echo "::error::Jest worker ${i} did not exhaust the queue or report nothing to do"
              FAIL=1
            fi
          done

          echo "## Scenario 3: Jest adapter — all specs pass" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "2 workers used the Jest adapter to run 6 passing specs via work-stealing." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full worker logs</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2; do
            echo "**Worker ${i}**" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "jest-pass-w${i}.log" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          exit $FAIL

      # ── Scenario 4: Jest adapter — some specs fail ──

      - name: "Scenario 4: Jest adapter — some specs fail"
        id: scenario4
        if: always()
        run: |
          cd test/fixtures/jest-project

          # Push all specs including the 2 failing ones (8 total)
          SPECBANDIT="../../../dist/bin.js"
          KEY="e2e-jest-fail-${{ github.run_id }}"
          node "$SPECBANDIT" push --key "$KEY" \
            specs/math.test.js specs/strings.test.js specs/arrays.test.js \
            specs/objects.test.js specs/async.test.js specs/regex.test.js \
            specs/fail-math.test.js specs/fail-string.test.js

          mkdir -p jest-fail-results

          GITHUB_STEP_SUMMARY= node "$SPECBANDIT" work --key "$KEY" --key-rerun "${KEY}-w1" \
            --adapter jest --jest-config ./jest.config.js --project-root . \
            --command-opts "--cacheDirectory .jest-cache-w1" \
            --batch-size 1 --verbose --json-out jest-fail-results/w1.json > jest-fail-w1.log 2>&1 &
          PID1=$!
          GITHUB_STEP_SUMMARY= node "$SPECBANDIT" work --key "$KEY" --key-rerun "${KEY}-w2" \
            --adapter jest --jest-config ./jest.config.js --project-root . \
            --command-opts "--cacheDirectory .jest-cache-w2" \
            --batch-size 1 --verbose --json-out jest-fail-results/w2.json > jest-fail-w2.log 2>&1 &
          PID2=$!

          W1_EXIT=0; wait $PID1 || W1_EXIT=$?
          W2_EXIT=0; wait $PID2 || W2_EXIT=$?

          for i in 1 2; do
            EXIT_VAR="W${i}_EXIT"
            echo "========== Jest Worker ${i} (exit: $(eval echo "\$$EXIT_VAR")) =========="
            cat "jest-fail-w${i}.log"
            echo ""
          done

          ERRORS=0

          # At least one worker must have failed (because of fail-math.test.js / fail-string.test.js)
          if [ "$W1_EXIT" -eq 0 ] && [ "$W2_EXIT" -eq 0 ]; then
            echo "::error::Expected at least one Jest worker to exit non-zero, but all exited 0"
            ERRORS=$((ERRORS + 1))
          fi

          # Verify Jest adapter was actually used
          ADAPTER_USED=0
          for i in 1 2; do
            if grep -q "\[specbandit:jest\] Setup complete" "jest-fail-w${i}.log"; then
              ADAPTER_USED=1
            fi
          done
          if [ "$ADAPTER_USED" -eq 0 ]; then
            echo "::error::No worker log contains Jest adapter setup message"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one worker log must contain "SOME FAILED"
          if ! grep -q "SOME FAILED" jest-fail-w*.log; then
            echo "::error::No Jest worker reported 'SOME FAILED'"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one batch passed somewhere
          if ! grep -q "passed\." jest-fail-w*.log; then
            echo "::error::No Jest worker reported any passing batch"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one batch failed somewhere
          if ! grep -q "FAILED (exit code:" jest-fail-w*.log; then
            echo "::error::No Jest worker reported any failing batch"
            ERRORS=$((ERRORS + 1))
          fi

          # Every worker must have exhausted the queue or had nothing to do
          for i in 1 2; do
            if ! grep -q "Queue exhausted\|Nothing to do" "jest-fail-w${i}.log"; then
              echo "::error::Jest worker ${i} did not exhaust the queue or report nothing to do"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # JSON output validation
          TOTAL_JSON_FILES=0
          TOTAL_JSON_FAILED=0
          for i in 1 2; do
            JSON_FILE="jest-fail-results/w${i}.json"
            if [ -f "$JSON_FILE" ]; then
              W_FILES=$(node -e "const j=JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8')); console.log(j.summary.total_files)")
              W_FAILED=$(node -e "const j=JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8')); console.log(j.summary.failed_batches)")
              echo "Jest Worker ${i} JSON: ${W_FILES} files, ${W_FAILED} failed batches"
              TOTAL_JSON_FILES=$((TOTAL_JSON_FILES + W_FILES))
              TOTAL_JSON_FAILED=$((TOTAL_JSON_FAILED + W_FAILED))
            fi
          done

          if [ "$TOTAL_JSON_FILES" -ne 8 ]; then
            echo "::error::Expected 8 total files in merged Jest JSONs, found $TOTAL_JSON_FILES"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$TOTAL_JSON_FAILED" -ne 2 ]; then
            echo "::error::Expected 2 total failed batches in merged Jest JSONs, found $TOTAL_JSON_FAILED"
            ERRORS=$((ERRORS + 1))
          fi

          echo "## Scenario 4: Jest adapter — some specs fail" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "2 workers used the Jest adapter for a mix of 6 passing and 2 failing specs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full worker logs</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2; do
            echo "**Worker ${i}**" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "jest-fail-w${i}.log" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          exit $ERRORS

      # ── Scenario 5: Jest adapter — args after `--` forwarded to Jest ──

      - name: "Scenario 5: Jest adapter — args via double dash"
        id: scenario5
        if: always()
        run: |
          cd test/fixtures/jest-project

          # This scenario mimics Factorial's real invocation pattern:
          #   specbandit work --adapter jest --key KEY -- --silent --passWithNoTests
          # Previously, args after `--` were silently dropped (never forwarded to Jest).

          SPECBANDIT="../../../dist/bin.js"
          KEY="e2e-jest-dashdash-${{ github.run_id }}"
          node "$SPECBANDIT" push --key "$KEY" \
            specs/math.test.js specs/strings.test.js specs/arrays.test.js \
            specs/objects.test.js specs/async.test.js specs/regex.test.js

          mkdir -p jest-dashdash-results

          # Use -- to pass --silent and --passWithNoTests (instead of --command-opts)
          GITHUB_STEP_SUMMARY= node "$SPECBANDIT" work --key "$KEY" --key-rerun "${KEY}-w1" \
            --adapter jest --jest-config ./jest.config.js --project-root . \
            --batch-size 3 --verbose --json-out jest-dashdash-results/w1.json \
            -- --silent --passWithNoTests > jest-dashdash-w1.log 2>&1 &
          PID1=$!
          GITHUB_STEP_SUMMARY= node "$SPECBANDIT" work --key "$KEY" --key-rerun "${KEY}-w2" \
            --adapter jest --jest-config ./jest.config.js --project-root . \
            --batch-size 3 --verbose --json-out jest-dashdash-results/w2.json \
            -- --silent --passWithNoTests > jest-dashdash-w2.log 2>&1 &
          PID2=$!

          FAIL=0
          wait $PID1 || FAIL=1
          wait $PID2 || FAIL=1

          for i in 1 2; do
            echo "========== Jest Worker ${i} (-- args) =========="
            cat "jest-dashdash-w${i}.log"
            echo ""
          done

          # All workers should succeed (only passing specs)
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Expected all Jest workers to pass with -- args"
            # Don't exit yet, continue checks
          fi

          # Verify Jest adapter was used
          ADAPTER_USED=0
          for i in 1 2; do
            if grep -q "\[specbandit:jest\] Setup complete" "jest-dashdash-w${i}.log"; then
              ADAPTER_USED=1
            fi
          done
          if [ "$ADAPTER_USED" -eq 0 ]; then
            echo "::error::No worker log contains Jest adapter setup message"
            FAIL=1
          fi

          # Must NOT contain "Adapter not initialized" error
          for i in 1 2; do
            if grep -q "Adapter not initialized" "jest-dashdash-w${i}.log"; then
              echo "::error::Worker ${i} hit 'Adapter not initialized' error — args after -- not forwarded?"
              FAIL=1
            fi
          done

          # Every worker must have exhausted the queue or had nothing to do
          for i in 1 2; do
            if ! grep -q "Queue exhausted\|Nothing to do" "jest-dashdash-w${i}.log"; then
              echo "::error::Jest worker ${i} did not exhaust the queue or report nothing to do"
              FAIL=1
            fi
          done

          # JSON validation: all 6 files must have been processed
          TOTAL_JSON_FILES=0
          for i in 1 2; do
            JSON_FILE="jest-dashdash-results/w${i}.json"
            if [ -f "$JSON_FILE" ]; then
              W_FILES=$(node -e "const j=JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8')); console.log(j.summary.total_files)")
              echo "Worker ${i} JSON: ${W_FILES} files"
              TOTAL_JSON_FILES=$((TOTAL_JSON_FILES + W_FILES))
            fi
          done

          if [ "$TOTAL_JSON_FILES" -ne 6 ]; then
            echo "::error::Expected 6 total files in merged Jest JSONs (-- args), found $TOTAL_JSON_FILES"
            FAIL=1
          fi

          echo "## Scenario 5: Jest adapter — args via double dash" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "2 workers used the Jest adapter with \`-- --silent --passWithNoTests\` pattern." >> "$GITHUB_STEP_SUMMARY"

          exit $FAIL

      # ── Final gate ──

      - name: "Check all scenarios passed"
        if: always()
        run: |
          FAILED=""
          if [ "${{ steps.scenario1.outcome }}" != "success" ]; then FAILED="$FAILED scenario1"; fi
          if [ "${{ steps.scenario2.outcome }}" != "success" ]; then FAILED="$FAILED scenario2"; fi
          if [ "${{ steps.scenario3.outcome }}" != "success" ]; then FAILED="$FAILED scenario3"; fi
          if [ "${{ steps.scenario4.outcome }}" != "success" ]; then FAILED="$FAILED scenario4"; fi
          if [ "${{ steps.scenario5.outcome }}" != "success" ]; then FAILED="$FAILED scenario5"; fi
          if [ -n "$FAILED" ]; then
            echo "::error::Failed scenarios:$FAILED"
            exit 1
          fi
