name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run unit tests
        run: |
          GITHUB_STEP_SUMMARY=/dev/null npm run test

  typecheck:
    name: "Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  e2e:
    name: "E2E"
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build

      # ── Scenario 1: all specs pass ──

      - name: "Scenario 1: All specs pass"
        id: scenario1
        run: |
          mkdir -p tmp/e2e_pass_specs
          for i in $(seq 1 12); do
            echo 'setTimeout(() => process.exit(0), 500)' > "tmp/e2e_pass_specs/slow_${i}.js"
          done

          node dist/bin.js push \
            --key "e2e-pass-${{ github.run_id }}" \
            --pattern 'tmp/e2e_pass_specs/*.js'

          KEY="e2e-pass-${{ github.run_id }}"

          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w1" --command node --batch-size 1 --verbose > pass-worker-1.log 2>&1 &
          PID1=$!
          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w2" --command node --batch-size 1 --verbose > pass-worker-2.log 2>&1 &
          PID2=$!
          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w3" --command node --batch-size 1 --verbose > pass-worker-3.log 2>&1 &
          PID3=$!

          FAIL=0
          wait $PID1 || FAIL=1
          wait $PID2 || FAIL=1
          wait $PID3 || FAIL=1

          for i in 1 2 3; do
            echo "========== Worker ${i} =========="
            cat "pass-worker-${i}.log"
            echo ""
          done

          echo "## Scenario 1: All specs pass" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "3 workers competed for 12 passing scripts via work-stealing." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Worker | Files | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3; do
            FILES=$(grep "^  tmp/" "pass-worker-${i}.log" | sed 's/^  //' | tr '\n' ', ' | sed 's/,$//')
            if grep -q "SOME FAILED\|FAILED" "pass-worker-${i}.log"; then
              STATUS="Failed"
            elif grep -q "Nothing to do" "pass-worker-${i}.log"; then
              STATUS="Idle (queue was empty)"
            else
              STATUS="Passed"
            fi
            echo "| Worker ${i} | \`${FILES:-none}\` | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full worker logs</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3; do
            echo "**Worker ${i}**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "pass-worker-${i}.log" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          exit $FAIL

      # ── Scenario 2: some specs fail ──

      - name: "Scenario 2: Some specs fail"
        id: scenario2
        if: always()
        run: |
          mkdir -p tmp/e2e_fail_specs
          for i in $(seq 1 8); do
            echo 'setTimeout(() => process.exit(0), 300)' > "tmp/e2e_fail_specs/pass_${i}.js"
          done
          for i in $(seq 1 4); do
            echo 'process.exit(1)' > "tmp/e2e_fail_specs/fail_${i}.js"
          done

          node dist/bin.js push \
            --key "e2e-fail-${{ github.run_id }}" \
            --pattern 'tmp/e2e_fail_specs/*.js'

          KEY="e2e-fail-${{ github.run_id }}"
          mkdir -p tmp/e2e_fail_results

          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w1" --command node --batch-size 1 --verbose --json-out tmp/e2e_fail_results/w1.json > fail-worker-1.log 2>&1 &
          PID1=$!
          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w2" --command node --batch-size 1 --verbose --json-out tmp/e2e_fail_results/w2.json > fail-worker-2.log 2>&1 &
          PID2=$!
          GITHUB_STEP_SUMMARY= node dist/bin.js work --key "$KEY" --key-rerun "${KEY}-w3" --command node --batch-size 1 --verbose --json-out tmp/e2e_fail_results/w3.json > fail-worker-3.log 2>&1 &
          PID3=$!

          W1_EXIT=0; wait $PID1 || W1_EXIT=$?
          W2_EXIT=0; wait $PID2 || W2_EXIT=$?
          W3_EXIT=0; wait $PID3 || W3_EXIT=$?

          for i in 1 2 3; do
            EXIT_VAR="W${i}_EXIT"
            echo "========== Worker ${i} (exit: $(eval echo "\$$EXIT_VAR")) =========="
            cat "fail-worker-${i}.log"
            echo ""
          done

          # --- Assertions ---
          ERRORS=0

          # At least one worker must have failed
          if [ "$W1_EXIT" -eq 0 ] && [ "$W2_EXIT" -eq 0 ] && [ "$W3_EXIT" -eq 0 ]; then
            echo "::error::Expected at least one worker to exit with code 1, but all exited 0"
            ERRORS=$((ERRORS + 1))
          fi

          # All 12 script files must appear across the worker logs
          TOTAL_FILES=$(cat fail-worker-*.log | grep "^  tmp/" | wc -l | tr -d ' ')
          if [ "$TOTAL_FILES" -ne 12 ]; then
            echo "::error::Expected 12 spec files across all workers, found $TOTAL_FILES"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one worker log must contain "SOME FAILED"
          if ! grep -q "SOME FAILED" fail-worker-*.log; then
            echo "::error::No worker reported 'SOME FAILED'"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one batch passed somewhere
          if ! grep -q "passed\." fail-worker-*.log; then
            echo "::error::No worker reported any passing batch"
            ERRORS=$((ERRORS + 1))
          fi

          # At least one batch failed somewhere
          if ! grep -q "FAILED (exit code:" fail-worker-*.log; then
            echo "::error::No worker reported any failing batch"
            ERRORS=$((ERRORS + 1))
          fi

          # Every worker must have exhausted the queue or had nothing to do
          for i in 1 2 3; do
            if ! grep -q "Queue exhausted\|Nothing to do" "fail-worker-${i}.log"; then
              echo "::error::Worker ${i} did not exhaust the queue or report nothing to do"
              ERRORS=$((ERRORS + 1))
            fi
          done

          # JSON output: each worker's JSON must have batch_timings and correct total_files
          TOTAL_JSON_FILES=0
          TOTAL_JSON_FAILED=0
          for i in 1 2 3; do
            JSON_FILE="tmp/e2e_fail_results/w${i}.json"
            if [ -f "$JSON_FILE" ]; then
              W_FILES=$(node -e "const j=JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8')); console.log(j.summary.total_files)")
              W_FAILED=$(node -e "const j=JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8')); console.log(j.summary.failed_batches)")
              echo "Worker ${i} JSON: ${W_FILES} files, ${W_FAILED} failed batches"
              TOTAL_JSON_FILES=$((TOTAL_JSON_FILES + W_FILES))
              TOTAL_JSON_FAILED=$((TOTAL_JSON_FAILED + W_FAILED))

              HAS_TIMINGS=$(node -e "const j=JSON.parse(require('fs').readFileSync('${JSON_FILE}','utf8')); console.log('batch_timings' in j)")
              if [ "$HAS_TIMINGS" != "true" ]; then
                echo "::error::Worker ${i} JSON missing batch_timings key"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done

          # Total files across all JSON files must equal 12
          if [ "$TOTAL_JSON_FILES" -ne 12 ]; then
            echo "::error::Expected 12 total files in merged JSONs, found $TOTAL_JSON_FILES"
            ERRORS=$((ERRORS + 1))
          fi

          # Total failed batches must equal 4
          if [ "$TOTAL_JSON_FAILED" -ne 4 ]; then
            echo "::error::Expected 4 total failed batches in merged JSONs, found $TOTAL_JSON_FAILED"
            ERRORS=$((ERRORS + 1))
          fi

          echo "## Scenario 2: Some specs fail" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "3 workers competed for a mix of 8 passing and 4 failing scripts." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Worker | Exit | Files | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|------|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3; do
            EXIT_VAR="W${i}_EXIT"
            EXIT_CODE=$(eval echo "\$$EXIT_VAR")
            FILES=$(grep "^  tmp/" "fail-worker-${i}.log" | sed 's/^  //' | tr '\n' ', ' | sed 's/,$//')
            if grep -q "SOME FAILED" "fail-worker-${i}.log"; then
              STATUS="Failed"
            elif grep -q "Nothing to do" "fail-worker-${i}.log"; then
              STATUS="Idle (queue was empty)"
            else
              STATUS="Passed"
            fi
            echo "| Worker ${i} | ${EXIT_CODE} | \`${FILES:-none}\` | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full worker logs</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for i in 1 2 3; do
            echo "**Worker ${i}**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "fail-worker-${i}.log" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

          exit $ERRORS

      # ── Final gate ──

      - name: "Check all scenarios passed"
        if: always()
        run: |
          if [ "${{ steps.scenario1.outcome }}" != "success" ] || [ "${{ steps.scenario2.outcome }}" != "success" ]; then
            echo "::error::One or more E2E scenarios failed"
            exit 1
          fi
